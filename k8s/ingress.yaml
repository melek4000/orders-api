apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orders-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: orders.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: orders-svc
            port:
              number: 80
